name: myapp
description: Movie catalog app dengan BLoC, API integration, dan local storage fallback.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # API
  http: ^1.2.2

  # Local storage (fallback kalau offline)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Cek koneksi internet
  connectivity_plus: ^6.0.5

  # Cache gambar dari network
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
